name: Traffic Scraper Automation

on:
  # Triggered by your Google Cloud Scheduler every 15 minutes!
  repository_dispatch:
    types: [trigger-scraper]

  # Keeps the manual button in the GitHub UI just in case
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # Great job keeping this, it makes it much faster!

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper_requirements.txt

      - name: Run Scraper
        # We pass the secrets directly to the Python script in memory (No more echo!)
        env:
          FIREBASE_KEY_JSON: ${{ secrets.FIREBASE_KEY_JSON }}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          python scrape_traffic.py
