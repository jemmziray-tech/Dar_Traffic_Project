name: Traffic Scraper Automation

on:
  schedule:
    - cron: '*/15 * * * *' # This runs every 15 minutes
  workflow_dispatch:      # This lets you run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          FIREBASE_KEY_DATA: ${{ secrets.FIREBASE_KEY_JSON }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          echo "$FIREBASE_KEY_DATA" > firebase-key.json
          python scrape_traffic.py