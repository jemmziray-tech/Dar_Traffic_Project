name: Traffic Scraper Automation

on:
  schedule:
    # Runs every 15 minutes, but ONLY between 02:00 UTC and 20:00 UTC.
    # Note: Tanzania is UTC+3. 
    # 02:00 UTC = 5:00 AM EAT (Tanzania Time)
    # 20:00 UTC = 11:00 PM EAT (Tanzania Time)
    - cron: '*/15 2-20 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          FIREBASE_KEY_DATA: ${{ secrets.FIREBASE_KEY_JSON }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          echo "$FIREBASE_KEY_DATA" > firebase-key.json
          python scrape_traffic.py
