name: Traffic Scraper Automation

on:
  # 1. We removed the unreliable 'schedule' cron job.
  # 2. NEW: We added 'repository_dispatch'. This opens a secure "door"
  # allowing external services (like Google Cloud) to trigger this script instantly.
  repository_dispatch:
    types: [trigger-scraper]

  # Keeps the manual button in the GitHub UI just in case you need to test it!
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip" # Pro-tip: Caches dependencies to make the bot run even faster!

      - name: Install dependencies
        run: |
          pip install -r scraper_requirements.txt

      - name: Run Scraper
        env:
          FIREBASE_KEY_DATA: ${{ secrets.FIREBASE_KEY_JSON }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          echo "$FIREBASE_KEY_DATA" > firebase-key.json
          python scrape_traffic.py
