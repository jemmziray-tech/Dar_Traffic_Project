name: Scheduled AI Retraining

on:
  schedule:
    # Runs at 00:00 every day (UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually for testing by clicking a button in GitHub

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Firebase Key File
        run: |
          echo '${{ secrets.FIREBASE_KEY_JSON }}' > firebase-key.json

      - name: Run Training Script
        run: python train_model.py

      - name: Commit and Push New Model
        run: |
          git config --global user.name 'AI Retraining Bot'
          git config --global user.email 'bot@ujenzismart.com'
          git add traffic_model.pkl model_metrics.csv
          git commit -m "auto: periodic model retraining and metrics log" || echo "No changes to commit"
          git push
